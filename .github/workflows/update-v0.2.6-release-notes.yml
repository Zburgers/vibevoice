name: Publish curated VibeVoice 0.2.6 release notes

on:
  push:
    branches:
      - master
    paths:
      - docs/releases/v0.2.6.md
      - .github/workflows/update-v0.2.6-release-notes.yml

permissions:
  contents: write

jobs:
  update-release-notes:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Replace GitHub release body
        run: gh release edit v0.2.6 --repo "$GITHUB_REPOSITORY" --notes-file docs/releases/v0.2.6.md

      - name: Remove one-time publisher
        run: |
          rm .github/workflows/update-v0.2.6-release-notes.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/workflows/update-v0.2.6-release-notes.yml
          git commit -m "chore: remove v0.2.6 release notes publisher"
          git push origin HEAD:master
