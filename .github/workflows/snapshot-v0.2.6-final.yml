name: Snapshot final VibeVoice 0.2.6 publication

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/snapshot-v0.2.6-final.yml

permissions:
  actions: read
  contents: write

jobs:
  snapshot-release:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_SHA: 451122a7dc8dbea1b261798bc3e7bea0db9d2e64
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Capture current final release state
        shell: bash
        run: |
          set -uo pipefail
          output="docs/releases/v0.2.6-final-snapshot.txt"
          mkdir -p "$(dirname "$output")"
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?event=push&branch=master&per_page=50" --jq ".workflow_runs[] | select(.head_sha == env.RELEASE_SHA) | {id, status, conclusion, html_url, created_at, updated_at}" | head -n 1)"
          {
            echo "Release commit: ${RELEASE_SHA}"
            echo "Captured at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Run: ${run_json:-not found}"
            if [ -n "$run_json" ]; then
              run_id="$(jq -r '.id' <<<"$run_json")"
              echo
              echo "Jobs:"
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
                --jq '.jobs[] | {id, name, status, conclusion, html_url, active_or_failed_steps: [.steps[] | select(.status != "completed" or .conclusion == "failure") | {number, name, status, conclusion}]}' || true
            fi
            echo
            echo "Release:"
            gh api "repos/${GITHUB_REPOSITORY}/releases/tags/v0.2.6" \
              --jq '{id, tag_name, name, draft, prerelease, html_url, published_at, assets: [.assets[] | {name, size, content_type}]}' || true
            echo
            echo "Malformed v ref:"
            gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/v" --jq '{ref, object}' 2>/dev/null || echo "absent"
          } > "$output" 2>&1

      - name: Commit release snapshot
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/releases/v0.2.6-final-snapshot.txt
          git commit -m "ci: snapshot final v0.2.6 publication"
          git push origin HEAD:master
