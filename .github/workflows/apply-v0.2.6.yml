name: Apply and validate VibeVoice 0.2.6

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  apply-and-validate:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'fix/history-atomic-v0.2.6'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply scoped patch
        run: python .github/patches/run_v0_2_6.py

      - name: Format Rust
        run: cargo fmt --manifest-path app/src-tauri/Cargo.toml --all

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Build frontend
        working-directory: app
        run: npm run build

      - name: Check Rust backend
        working-directory: app/src-tauri
        run: cargo check --no-default-features

      - name: Test Rust backend
        working-directory: app/src-tauri
        run: cargo test --no-default-features

      - name: Verify clean formatting and patch
        run: |
          cargo fmt --manifest-path app/src-tauri/Cargo.toml --all -- --check
          git diff --check

      - name: Commit validated implementation
        run: |
          rm -rf .github/patches
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "fix: harden history persistence and desktop controls"
          git push origin HEAD:fix/history-atomic-v0.2.6
