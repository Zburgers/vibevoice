name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.ref, 'refs/tags/') ||
      (github.event_name == 'push' &&
      github.ref == 'refs/heads/master' &&
      startsWith(github.event.head_commit.message, 'release: v'))
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            args: ""
          - name: Linux
            os: ubuntu-22.04
            args: ""
          - name: macOS Apple Silicon
            os: macos-14
            args: --target aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS target
        if: matrix.os == 'macos-14'
        run: rustup target add aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Read and validate app version
        id: version
        shell: bash
        working-directory: app
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid application version: '$version'" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Publishing VibeVoice v$version"

      - name: Remove malformed v release from failed 0.2.6 attempt
        if: >-
          matrix.name == 'Linux' &&
          !startsWith(github.ref, 'refs/tags/') &&
          steps.version.outputs.version == '0.2.6'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          release_id="$(gh api "repos/${GITHUB_REPOSITORY}/releases/tags/v" --jq '.id' 2>/dev/null || true)"
          if [ -n "$release_id" ]; then
            gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
          fi
          gh api --method DELETE "repos/${GITHUB_REPOSITORY}/git/refs/tags/v" >/dev/null 2>&1 || true

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: app
          args: ${{ matrix.args }}
          includeRelease: true
          includeUpdaterJson: true
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('VibeVoice {0}', github.ref_name) || format('VibeVoice v{0}', steps.version.outputs.version) }}
          releaseBody: 'VibeVoice 0.2.6 hardens local history persistence, fixes timer and pill behavior, restores window resizing, and adds pill always-on-top customization.'
          generateReleaseNotes: true
          releaseDraft: false
          prerelease: false
