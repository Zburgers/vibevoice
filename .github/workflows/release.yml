name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            bundles: nsis,msi
          - name: Linux
            os: ubuntu-22.04
            bundles: deb,rpm,appimage
          - name: macOS Intel
            os: macos-13
            bundles: dmg,app
          - name: macOS Apple Silicon
            os: macos-latest
            bundles: dmg,app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        with:
          projectPath: app
          tagName: ${{ github.ref_name }}
          releaseName: VibeVoice ${{ github.ref_name }}
          releaseBody: |
            VibeVoice desktop installers and updater metadata.

            Installers are attached for Windows, Linux, and macOS. Existing packaged installs check this release's signed updater metadata automatically.
          releaseDraft: false
          prerelease: false
          updaterJsonPreferNsis: true
          args: --bundles ${{ matrix.bundles }}
