name: Release

on:
  push:
    branches:
      - master
    tags:
      - "v*"
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-tauri:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            os: windows-latest
            args: ""
          - name: Linux
            os: ubuntu-22.04
            args: ""
          - name: macOS Apple Silicon
            os: macos-14
            args: --target aarch64-apple-darwin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install macOS target
        if: matrix.os == 'macos-14'
        run: rustup target add aarch64-apple-darwin

      - name: Cache Rust
        uses: swatinem/rust-cache@v2
        with:
          workspaces: app/src-tauri

      - name: Install frontend dependencies
        run: npm ci
        working-directory: app

      - name: Read app version
        id: version
        run: echo "version=$(node -p \"require('./app/package.json').version\")" >> "$GITHUB_OUTPUT"

      - name: Build and publish release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: app
          args: ${{ matrix.args }}
          uploadWorkflowArtifacts: true
          uploadUpdaterJson: false
          uploadUpdaterSignatures: false
          tagName: ${{ github.event_name == 'pull_request' && '' || startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', steps.version.outputs.version) }}
          releaseName: ${{ github.event_name == 'pull_request' && '' || startsWith(github.ref, 'refs/tags/') && format('VibeVoice {0}', github.ref_name) || format('VibeVoice v{0}', steps.version.outputs.version) }}
          releaseBody: ${{ github.event_name == 'pull_request' && '' || 'VibeVoice desktop installers for Windows, Linux, and macOS Apple Silicon.' }}
          releaseDraft: false
          prerelease: false
