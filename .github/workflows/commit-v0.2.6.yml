name: Commit validated VibeVoice 0.2.6

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  commit-validated-tree:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'fix/history-atomic-v0.2.6'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Rust formatter
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Apply validated patch
        run: |
          python .github/patches/run_v0_2_6.py
          cargo fmt --manifest-path app/src-tauri/Cargo.toml --all
          rm -rf .github/patches

      - name: Capture commit and push
        shell: bash
        run: |
          set +e
          {
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add -A
            git commit -m "fix: harden history persistence and desktop controls"
            git push origin HEAD:fix/history-atomic-v0.2.6
          } 2>&1 | tee commit-push.log
          echo "${PIPESTATUS[0]}" > commit-push.status
          exit 0

      - name: Upload commit diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: v0.2.6-commit-diagnostics
          path: |
            commit-push.log
            commit-push.status
          if-no-files-found: error

      - name: Enforce commit result
        run: test "$(cat commit-push.status)" -eq 0
