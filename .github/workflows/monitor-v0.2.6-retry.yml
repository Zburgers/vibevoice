name: Capture VibeVoice 0.2.6 Linux failure

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/monitor-v0.2.6-retry.yml

permissions:
  actions: read
  contents: write

jobs:
  capture-linux-failure:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      RUN_ID: 29088192342
      JOB_ID: 86346864487
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Capture failed Linux job output
        shell: bash
        run: |
          set -uo pipefail
          output="docs/releases/v0.2.6-linux-failure.txt"
          mkdir -p "$(dirname "$output")"
          {
            echo "Run: ${RUN_ID}"
            echo "Job: ${JOB_ID}"
            echo "Captured at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo
            echo "Job metadata:"
            gh api "repos/${GITHUB_REPOSITORY}/actions/jobs/${JOB_ID}" \
              --jq '{name, status, conclusion, html_url, steps: [.steps[] | select(.conclusion == "failure") | {number, name, status, conclusion}]}' || true
            echo
            echo "Failed log output:"
            gh run view "${RUN_ID}" --repo "${GITHUB_REPOSITORY}" --job "${JOB_ID}" --log-failed || true
          } > "$output" 2>&1

      - name: Commit captured failure
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/releases/v0.2.6-linux-failure.txt
          git commit -m "ci: capture Linux v0.2.6 packaging failure"
          git push origin HEAD:master
