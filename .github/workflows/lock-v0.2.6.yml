name: Resolve VibeVoice 0.2.6 lockfile

on:
  pull_request:
    branches:
      - master

permissions:
  contents: write

jobs:
  resolve-lockfile:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'fix/history-atomic-v0.2.6'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Resolve dependency graph
        working-directory: app/src-tauri
        run: cargo metadata --format-version 1 > /dev/null

      - name: Commit lockfile
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src-tauri/Cargo.lock
          git diff --cached --quiet && { echo "Cargo.lock was not updated"; exit 1; }
          git commit -m "build: update Rust lockfile for v0.2.6"
          git push origin HEAD:fix/history-atomic-v0.2.6
