name: Verify final VibeVoice 0.2.6 publication

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/verify-v0.2.6-final.yml

permissions:
  actions: read
  contents: write

jobs:
  verify-release:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_SHA: 451122a7dc8dbea1b261798bc3e7bea0db9d2e64
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Wait for final release and capture results
        shell: bash
        run: |
          set -uo pipefail
          output="docs/releases/v0.2.6-final-status.txt"
          mkdir -p "$(dirname "$output")"
          run_json=""
          for attempt in $(seq 1 90); do
            run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?event=push&branch=master&per_page=50" --jq ".workflow_runs[] | select(.head_sha == env.RELEASE_SHA) | {id, status, conclusion, html_url, created_at, updated_at}" | head -n 1)"
            if [ -n "$run_json" ] && [ "$(jq -r '.status' <<<"$run_json")" = "completed" ]; then
              break
            fi
            sleep 20
          done
          {
            echo "Release commit: ${RELEASE_SHA}"
            echo "Captured at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            if [ -z "$run_json" ]; then
              echo "No final release workflow run was found."
            else
              echo "Run: ${run_json}"
              run_id="$(jq -r '.id' <<<"$run_json")"
              echo
              echo "Jobs:"
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
                --jq '.jobs[] | {id, name, status, conclusion, html_url, failed_steps: [.steps[] | select(.conclusion == "failure") | {number, name, conclusion}]}' || true
              echo
              echo "Release:"
              gh api "repos/${GITHUB_REPOSITORY}/releases/tags/v0.2.6" \
                --jq '{id, tag_name, name, draft, prerelease, html_url, published_at, assets: [.assets[] | {name, size, content_type}]}' || true
              echo
              echo "Malformed v tag still present:"
              gh api "repos/${GITHUB_REPOSITORY}/git/ref/tags/v" --jq '{ref, object}' 2>/dev/null || echo "no"
              echo
              echo "Failed logs:"
              gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed || true
            fi
          } > "$output" 2>&1

      - name: Commit final release status
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/releases/v0.2.6-final-status.txt
          git commit -m "ci: capture final v0.2.6 release status"
          git push origin HEAD:master
