name: Capture VibeVoice 0.2.6 release status

on:
  push:
    branches:
      - master
    paths:
      - .github/workflows/inspect-release-run.yml

permissions:
  actions: read
  contents: write

jobs:
  capture-release:
    runs-on: ubuntu-22.04
    env:
      GH_TOKEN: ${{ github.token }}
      RELEASE_SHA: 48b2d5dfb5eaee57d3544a5010d7d91db3413462
    steps:
      - name: Checkout master
        uses: actions/checkout@v4

      - name: Capture release workflow status and failed logs
        shell: bash
        run: |
          set -uo pipefail
          output="docs/releases/v0.2.6-workflow-status.txt"
          mkdir -p "$(dirname "$output")"
          run_json="$(gh api "repos/${GITHUB_REPOSITORY}/actions/workflows/release.yml/runs?event=push&branch=master&per_page=50" --jq ".workflow_runs[] | select(.head_sha == env.RELEASE_SHA) | {id, status, conclusion, html_url, created_at, updated_at}" | head -n 1)"
          {
            echo "Release commit: ${RELEASE_SHA}"
            echo "Captured at: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            if [ -z "$run_json" ]; then
              echo "No release workflow run was found for the release commit."
            else
              echo "Run: ${run_json}"
              run_id="$(jq -r '.id' <<<"$run_json")"
              echo
              echo "Jobs:"
              gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${run_id}/jobs?per_page=100" \
                --jq '.jobs[] | {id, name, status, conclusion, html_url, started_at, completed_at, failed_steps: [.steps[] | select(.conclusion == "failure") | {number, name, conclusion}]}' || true
              echo
              echo "Failed logs:"
              gh run view "$run_id" --repo "$GITHUB_REPOSITORY" --log-failed || true
            fi
          } > "$output" 2>&1

      - name: Commit captured status
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/releases/v0.2.6-workflow-status.txt
          git commit -m "ci: capture v0.2.6 release failure"
          git push origin HEAD:master
