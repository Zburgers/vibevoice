name: Diagnose VibeVoice 0.2.6 frontend

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  frontend-diagnostics:
    if: github.head_ref == 'fix/history-atomic-v0.2.6'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout PR merge
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Apply scoped patch
        run: python .github/patches/run_v0_2_6.py

      - name: Install frontend dependencies
        working-directory: app
        run: npm ci

      - name: Capture frontend build
        working-directory: app
        shell: bash
        run: |
          set +e
          npm run build 2>&1 | tee ../frontend-build.log
          echo "${PIPESTATUS[0]}" > ../frontend-build.status
          exit 0

      - name: Upload frontend diagnostics
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build-diagnostics
          path: |
            frontend-build.log
            frontend-build.status
          if-no-files-found: error

      - name: Enforce frontend result
        run: test "$(cat frontend-build.status)" -eq 0
